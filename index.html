<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Online de Avaliação - Matemática e Física</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- MathJax Configuração -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true,
        packages: ['base', 'ams', 'color']
      },
      svg: {
        fontCache: 'global'
      },
      startup: {
        pageReady: function() {
          return MathJax.startup.defaultPageReady().then(function() {
            console.log('MathJax está inicializado e pronto');
            window.mathJaxReady = true;
          });
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #2c3e50, #34495e);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 0 #2c3e50, 4px 4px 0 #34495e, 6px 6px 0 #1a252f;
      transform: perspective(500px) rotateX(2deg);
      letter-spacing: 2px;
    }
    .tab-container {
      display: flex;
      background: #34495e;
    }
    .tab {
      padding: 15px 30px;
      background: #34495e;
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
      flex: 1;
    }
    .tab:hover {
      background: #2c3e50;
    }
    .tab.active {
      background: #3498db;
    }
    .content {
      padding: 30px;
      min-height: 500px;
    }
    .hidden {
      display: none !important;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #2c3e50;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3498db;
    }
    .btn {
      background: #3498db;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    .btn:hover {
      background: #2980b9;
    }
    .btn-success {
      background: #27ae60;
    }
    .btn-success:hover {
      background: #219a52;
    }
    .btn-danger {
      background: #e74c3c;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .btn-warning {
      background: #f39c12;
    }
    .btn-warning:hover {
      background: #e67e22;
    }
    .question {
      background: #f8f9fa;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      border-left: 5px solid #3498db;
    }
    .question h3 {
      color: #2c3e50;
      margin-bottom: 15px;
    }
    .question-image {
      max-width: 100%;
      max-height: 300px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .options {
      display: grid;
      gap: 10px;
    }
    .option {
      padding: 15px;
      background: white;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: flex-start;
    }
    .option:hover {
      border-color: #3498db;
      background: #f1f8ff;
    }
    .option.selected {
      background: #d4edda;
      border-color: #28a745;
    }
    .option.incorrect {
      background: #f8d7da;
      border-color: #dc3545;
    }
    .option-letter {
      font-weight: bold;
      margin-right: 10px;
      min-width: 25px;
    }
    .option-content {
      flex: 1;
    }
    .feedback-message {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-weight: bold;
    }
    .feedback-correct {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .feedback-incorrect {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .score {
      font-size: 48px;
      font-weight: bold;
      color: #3498db;
      margin: 20px 0;
    }
    .result {
      text-align: center;
    }
    .audio-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      display: none;
      z-index: 1000;
    }
    .fireworks {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }
    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: explode 1s ease-out forwards;
    }
    @keyframes explode {
      0% {
        transform: translate(0, 0);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty));
        opacity: 0;
      }
    }
    .math-loading {
      opacity: 0.5;
      transition: opacity 0.3s;
    }
    .math-loaded {
      opacity: 1;
    }
    .question-item {
      background: #f8f9fa;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 4px solid #3498db;
      position: relative;
    }
    .question-item small {
      color: #7f8c8d;
    }
    .teacher-panel h3 {
      margin-bottom: 20px;
      color: #2c3e50;
    }
    .teacher-subtab {
      display: flex;
      margin-bottom: 20px;
      background: #ecf0f1;
      border-radius: 8px;
      overflow: hidden;
    }
    .teacher-subtab button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #ecf0f1;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    .teacher-subtab button.active {
      background: #3498db;
      color: white;
    }
    .result-item {
      background: #f8f9fa;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border-left: 4px solid #27ae60;
      cursor: pointer;
    }
    .result-item:hover {
      background: #e9ecef;
    }
    .result-detail {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }
    .result-question {
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }
    .result-question.correct {
      background: #d4edda;
    }
    .result-question.incorrect {
      background: #f8d7da;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .stat-card {
      background: #3498db;
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card h4 {
      margin-bottom: 10px;
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Sistema On-line de Avaliação</h1>
      <p>Matemática e Física</p>
    </div>
    <div class="tab-container">
      <button class="tab active" onclick="showTab('student')">Aluno</button>
      <button class="tab" onclick="showTab('teacher')">Professor</button>
    </div>

    <!-- ABA DO ALUNO -->
    <div id="studentTab" class="content">
      <div id="studentForm">
        <div class="form-group">
          <label for="school">Escola:</label>
          <select id="school" onchange="updateEducationLevels()">
            <option value="">Selecione sua escola</option>
            <option value="Jose Wilson">EEEFM Prof José Wilson Pereira Leite</option>
            <option value="CEAM">CEAM - Colégio Estadual de Ensino Médio Integral Archangelia Milhomem</option>
          </select>
        </div>
        <div class="form-group">
          <label for="educationLevel">Nível de Ensino:</label>
          <select id="educationLevel" onchange="updateClasses()" disabled>
            <option value="">Selecione o nível de ensino</option>
          </select>
        </div>
        <div class="form-group">
          <label for="studentClass">Turma/Série:</label>
          <select id="studentClass" disabled>
            <option value="">Selecione sua turma/série</option>
          </select>
        </div>
        <div class="form-group">
          <label for="subject">Disciplina:</label>
          <select id="subject">
            <option value="math">Matemática</option>
            <option value="physics">Física</option>
          </select>
        </div>
        <div class="form-group">
          <label for="studentName">Nome completo:</label>
          <input type="text" id="studentName" placeholder="Digite seu nome">
        </div>
        <button class="btn" onclick="startQuiz()">Iniciar Avaliação</button>
      </div>

      <div id="quizContainer" class="hidden">
        <div id="questionsArea"></div>
      </div>

      <div id="resultsContainer" class="hidden">
        <div class="result">
          <h2>Avaliação Concluída!</h2>
          <div class="score" id="finalScore">0/0</div>
          <p id="resultMessage"></p>
          <button class="btn btn-success" onclick="shareResultsWhatsApp()">📱 Compartilhar WhatsApp</button>
          <button class="btn btn-warning" onclick="shareResultsEmail()">📧 Compartilhar E-mail</button>
          <button class="btn btn-info" onclick="copyResultsToClipboard()">📋 Copiar Resultado</button>
          <button class="btn" onclick="resetQuiz()">Nova Tentativa</button>
        </div>
      </div>
    </div>

    <!-- ABA DO PROFESSOR -->
    <div id="teacherTab" class="content hidden">
      <div id="teacherLogin">
        <div class="login-form">
          <h2>Acesso do Professor</h2>
          <div class="form-group">
            <label for="teacherPassword">Senha:</label>
            <input type="password" id="teacherPassword" placeholder="Digite a senha">
          </div>
          <button class="btn" onclick="loginTeacher()">Acessar</button>
        </div>
      </div>
      <div id="teacherPanel" class="hidden">
        <h2>Painel do Professor</h2>
        <div class="teacher-subtab">
          <button id="subtabQuestions" class="active" onclick="showTeacherSubtab('questions')">Questões</button>
          <button id="subtabResults" onclick="showTeacherSubtab('results')">Resultados</button>
        </div>

        <!-- Sub-aba: Gerenciar Questões -->
        <div id="teacherQuestions" class="teacher-panel">
          <h3>Gerenciar Questões</h3>
          <div class="form-group">
            <label for="newQuestion">Nova Questão (use $...$ para fórmulas matemáticas):</label>
            <textarea id="newQuestion" placeholder="Digite a questão" rows="3"></textarea>
          </div>
          <!-- NOVO: Campo para URL da imagem -->
          <div class="form-group">
            <label for="questionImage">URL da Imagem (opcional):</label>
            <input type="url" id="questionImage" placeholder="https://exemplo.com/imagem.jpg">
          </div>
          <div class="form-group">
            <label>Opções (use $...$ para fórmulas matemáticas):</label>
            <input type="text" id="optionA" placeholder="Opção A">
            <input type="text" id="optionB" placeholder="Opção B">
            <input type="text" id="optionC" placeholder="Opção C">
            <input type="text" id="optionD" placeholder="Opção D">
          </div>
          <div class="form-group">
            <label for="questionSubject">Disciplina:</label>
            <select id="questionSubject">
              <option value="math">Matemática</option>
              <option value="physics">Física</option>
            </select>
          </div>
          <div class="form-group">
            <label for="correctAnswer">Resposta Correta:</label>
            <select id="correctAnswer">
              <option value="0">A</option>
              <option value="1">B</option>
              <option value="2">C</option>
              <option value="3">D</option>
            </select>
          </div>
          <button class="btn" onclick="addQuestion()">Adicionar Questão</button>
          <div id="questionsList">
            <!-- Lista de questões será gerada aqui -->
          </div>
        </div>

        <!-- Sub-aba: Resultados -->
        <div id="teacherResults" class="teacher-panel hidden">
          <h3>Resultados dos Alunos</h3>
          <button class="btn" onclick="loadResults()">Atualizar Lista</button>
          <button class="btn btn-danger" onclick="clearAllResults()">Limpar Todos os Resultados</button>
          <div id="resultsStats"></div>
          <div id="resultsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Indicador de áudio -->
  <div class="audio-indicator" id="audioIndicator">Reproduzindo som...</div>

  <script>
    // Configuração inicial
    const TEACHER_PASSWORD = "prof123";
    const TEACHER_WHATSAPP = "+5594991446645";
    const TEACHER_EMAIL = "indaleciodasneves2023@professor.to.gov.br";

    window.mathJaxReady = false;

    // Estrutura da questão agora inclui 'subject' e 'imageUrl' (opcional)
    let questions = JSON.parse(localStorage.getItem('quizQuestions')) || []; // Inicia vazio

    // Armazenamento de resultados
    let results = JSON.parse(localStorage.getItem('quizResults')) || [];

    let currentQuestion = 0;
    let studentAnswers = [];
    let canAnswer = true;
    let currentSubject = 'math';
    let filteredQuestions = [];

    // Função melhorada para processar MathJax
    async function processMathJax(element) {
      if (!window.MathJax) {
        console.warn('MathJax não disponível');
        return;
      }
      try {
        await MathJax.startup.promise; // aguarda inicialização completa
        await MathJax.typesetPromise(element);
        console.log('MathJax processado');
      } catch (error) {
        console.error('Erro no MathJax:', error);
      }
    }

    // Funções para atualizar os campos dependentes
    function updateEducationLevels() {
      const school = document.getElementById('school').value;
      const educationLevel = document.getElementById('educationLevel');
      const studentClass = document.getElementById('studentClass');

      educationLevel.innerHTML = '<option value="">Selecione o nível de ensino</option>';
      studentClass.innerHTML = '<option value="">Selecione sua turma/série</option>';
      studentClass.disabled = true;
      educationLevel.disabled = true;

      if (school === 'Jose Wilson') {
        educationLevel.disabled = false;
        educationLevel.innerHTML += '<option value="Fundamental">Ensino Fundamental</option>';
        educationLevel.innerHTML += '<option value="Medio">Ensino Médio</option>';
      } else if (school === 'CEAM') {
        educationLevel.disabled = false;
        educationLevel.innerHTML += '<option value="Medio">Ensino Médio Integral</option>';
        setTimeout(updateClasses, 100);
      }
    }

    function updateClasses() {
      const school = document.getElementById('school').value;
      const educationLevel = document.getElementById('educationLevel').value;
      const studentClass = document.getElementById('studentClass');
      studentClass.innerHTML = '<option value="">Selecione sua turma/série</option>';
      studentClass.disabled = true;

      if (school === 'Jose Wilson') {
        if (educationLevel === 'Fundamental') {
          studentClass.disabled = false;
          studentClass.innerHTML += '<option value="7 Ano">7º Ano</option><option value="8 Ano">8º Ano</option><option value="9 Ano">9º Ano</option>';
        } else if (educationLevel === 'Medio') {
          studentClass.disabled = false;
          studentClass.innerHTML += '<option value="1 Ano">1º Ano</option><option value="2 Ano">2º Ano</option><option value="3 Ano">3º Ano</option>';
        }
      } else if (school === 'CEAM') {
        studentClass.disabled = false;
        studentClass.innerHTML += '<option value="23.01">23.01</option><option value="23.02">23.02</option><option value="33.01">33.01</option><option value="33.02">33.02</option>';
      }
    }

    // Funções de navegação
    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.content').forEach(content => content.classList.add('hidden'));

      // Marca a aba clicada
      if (tabName === 'student') {
        event.target.classList.add('active');
        document.getElementById('studentTab').classList.remove('hidden');
      } else {
        event.target.classList.add('active');
        document.getElementById('teacherTab').classList.remove('hidden');
      }

      setTimeout(() => {
        const activeTab = document.getElementById(tabName + 'Tab');
        if (activeTab) processMathJax(activeTab);
      }, 100);
    }

    // Funções do aluno
    function startQuiz() {
      const name = document.getElementById('studentName').value.trim();
      const school = document.getElementById('school').value;
      const educationLevel = document.getElementById('educationLevel').value;
      const studentClass = document.getElementById('studentClass').value;
      const subject = document.getElementById('subject').value;

      if (!name || !school || !educationLevel || !studentClass) {
        alert('Por favor, preencha todos os campos!');
        return;
      }

      // Filtra questões pela disciplina escolhida
      filteredQuestions = questions.filter(q => q.subject === subject);
      if (filteredQuestions.length === 0) {
        alert('Não há questões cadastradas para esta disciplina. Peça ao professor para adicionar.');
        return;
      }

      currentSubject = subject;
      currentQuestion = 0;
      studentAnswers = [];
      canAnswer = true;

      document.getElementById('studentForm').classList.add('hidden');
      document.getElementById('quizContainer').classList.remove('hidden');
      loadQuestion();
    }

    async function loadQuestion() {
      if (currentQuestion >= filteredQuestions.length) {
        finishQuiz();
        return;
      }

      const question = filteredQuestions[currentQuestion];
      const questionsArea = document.getElementById('questionsArea');

      // Monta HTML da questão, incluindo imagem se houver
      let imageHtml = '';
      if (question.imageUrl) {
        imageHtml = `<img src="${question.imageUrl}" alt="Imagem da questão" class="question-image" onerror="this.style.display='none'">`;
      }

      questionsArea.innerHTML = `
        <div class="question">
          <h3>Questão ${currentQuestion + 1} de ${filteredQuestions.length}</h3>
          ${imageHtml}
          <div class="math-display math-loading">
            ${question.question}
          </div>
          <div class="options">
            ${question.options.map((option, index) => `
              <div class="option" onclick="selectAnswer(${index})">
                <span class="option-letter">${String.fromCharCode(65 + index)})</span>
                <span class="option-content">${option}</span>
              </div>
            `).join('')}
          </div>
          <div id="feedbackMessage"></div>
          <div style="margin-top: 20px;">
            ${currentQuestion < filteredQuestions.length - 1 
              ? '<button class="btn" onclick="nextQuestion()" id="nextButton" style="display:none;">Próxima Questão →</button>' 
              : '<button class="btn btn-success" onclick="finishQuiz()" id="finishButton" style="display:none;">🏁 Finalizar Avaliação</button>'}
          </div>
        </div>
      `;

      // Processar MathJax na nova área
      await processMathJax(questionsArea);
      const mathDisplay = questionsArea.querySelector('.math-display');
      if (mathDisplay) {
        mathDisplay.classList.remove('math-loading');
        mathDisplay.classList.add('math-loaded');
      }
      canAnswer = true;
    }

    function selectAnswer(answerIndex) {
      if (!canAnswer) return;
      canAnswer = false;

      const options = document.querySelectorAll('.option');
      options.forEach(opt => opt.classList.remove('selected', 'incorrect'));

      // Marca a opção escolhida
      event.target.classList.add('selected');
      studentAnswers[currentQuestion] = answerIndex;

      const correctIndex = filteredQuestions[currentQuestion].correct;
      const feedbackMessage = document.getElementById('feedbackMessage');

      if (answerIndex !== correctIndex) {
        event.target.classList.add('incorrect');
        options[correctIndex].classList.add('selected');
        feedbackMessage.innerHTML = '<div class="feedback-message feedback-incorrect">❌ Resposta incorreta</div>';
        playErrorSound();
        setTimeout(() => { nextQuestion(); }, 2000);
      } else {
        feedbackMessage.innerHTML = '<div class="feedback-message feedback-correct">✅ Resposta correta!</div>';
        if (currentQuestion < filteredQuestions.length - 1) {
          document.getElementById('nextButton').style.display = 'inline-block';
        } else {
          document.getElementById('finishButton').style.display = 'inline-block';
        }
        playSuccessSound();
        createFireworks();
      }
    }

    async function nextQuestion() {
      currentQuestion++;
      await loadQuestion();
    }

    function finishQuiz() {
      if (studentAnswers[currentQuestion] === undefined && currentQuestion < filteredQuestions.length) {
        alert('Por favor, selecione uma resposta para esta questão!');
        return;
      }

      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('resultsContainer').classList.remove('hidden');

      let score = 0;
      filteredQuestions.forEach((question, index) => {
        if (studentAnswers[index] === question.correct) score++;
      });

      const finalScore = document.getElementById('finalScore');
      finalScore.textContent = `${score}/${filteredQuestions.length}`;
      const percentage = (score / filteredQuestions.length) * 100;
      const message = document.getElementById('resultMessage');

      if (percentage >= 80) {
        message.textContent = "🌟 Excelente! Você dominou os desafios!";
        message.style.color = "#27ae60";
        createFireworks();
      } else if (percentage >= 60) {
        message.textContent = "👍 Bom trabalho! Continue estudando!";
        message.style.color = "#f39c12";
      } else if (percentage >= 40) {
        message.textContent = "📚 Boa tentativa! Estude mais e tente novamente!";
        message.style.color = "#e67e22";
      } else {
        message.textContent = "💪 Não desista! A prática leva à perfeição!";
        message.style.color = "#e74c3c";
      }

      // Salvar resultado
      saveResult(score, filteredQuestions.length, percentage);

      setTimeout(() => {
        alert('Avaliação finalizada com sucesso! Seu resultado está pronto para ser compartilhado.');
      }, 1000);
    }

    function saveResult(score, total, percentage) {
      const name = document.getElementById('studentName').value.trim();
      const school = document.getElementById('school').value;
      const educationLevel = document.getElementById('educationLevel').value;
      const studentClass = document.getElementById('studentClass').value;
      const subject = document.getElementById('subject').value === 'math' ? 'Matemática' : 'Física';

      const resultDetail = {
        studentName: name,
        school: school,
        educationLevel: educationLevel,
        studentClass: studentClass,
        subject: subject,
        date: new Date().toISOString(),
        score: score,
        total: total,
        percentage: percentage.toFixed(1),
        questions: filteredQuestions.map((q, idx) => ({
          question: q.question,
          options: q.options,
          correct: q.correct,
          studentAnswer: studentAnswers[idx],
          isCorrect: studentAnswers[idx] === q.correct,
          imageUrl: q.imageUrl // guarda também a url da imagem
        }))
      };

      results.push(resultDetail);
      localStorage.setItem('quizResults', JSON.stringify(results));
    }

    // Funções de som (idênticas ao original)
    function playErrorSound() {
      const audioIndicator = document.getElementById('audioIndicator');
      audioIndicator.style.display = 'block';
      audioIndicator.textContent = '🔊 Som de erro...';
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      let time = audioContext.currentTime;
      for (let i = 0; i < 4; i++) {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(300 + i * 50, time);
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        gainNode.gain.setValueAtTime(0, time);
        gainNode.gain.linearRampToValueAtTime(0.3, time + 0.05);
        gainNode.gain.linearRampToValueAtTime(0, time + 0.15);
        oscillator.start(time);
        oscillator.stop(time + 0.15);
        time += 0.2;
      }
      setTimeout(() => {
        audioIndicator.textContent = '👏 Palmas...';
        const bufferSize = audioContext.sampleRate * 0.1;
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        const gainNode = audioContext.createGain();
        gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
        source.connect(gainNode);
        gainNode.connect(audioContext.destination);
        source.start();
        setTimeout(() => { audioIndicator.style.display = 'none'; }, 500);
      }, 900);
    }

    function playSuccessSound() {
      const audioIndicator = document.getElementById('audioIndicator');
      audioIndicator.style.display = 'block';
      audioIndicator.textContent = '🔊 Som de acerto!';
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(800, audioContext.currentTime + 0.5);
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      gainNode.gain.setValueAtTime(0, audioContext.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.3, audioContext.currentTime + 0.1);
      gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.5);
      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.5);
      setTimeout(() => {
        audioIndicator.textContent = '👏 Palmas!';
        const bufferSize = audioContext.sampleRate * 0.3;
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        const gainNode2 = audioContext.createGain();
        gainNode2.gain.setValueAtTime(0.5, audioContext.currentTime);
        gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        source.connect(gainNode2);
        gainNode2.connect(audioContext.destination);
        source.start();
        setTimeout(() => { audioIndicator.style.display = 'none'; }, 500);
      }, 600);
    }

    function createFireworks() {
      const fireworks = document.createElement('div');
      fireworks.className = 'fireworks';
      document.body.appendChild(fireworks);
      for (let i = 0; i < 150; i++) {
        setTimeout(() => {
          const firework = document.createElement('div');
          firework.className = 'firework';
          const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500'];
          firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          const startX = Math.random() * window.innerWidth;
          const startY = Math.random() * window.innerHeight;
          const angle = Math.random() * 2 * Math.PI;
          const distance = 50 + Math.random() * 100;
          const size = 6 + Math.random() * 6;
          firework.style.width = size + 'px';
          firework.style.height = size + 'px';
          firework.style.left = startX + 'px';
          firework.style.top = startY + 'px';
          firework.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
          firework.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
          fireworks.appendChild(firework);
        }, i * 20);
      }
      setTimeout(() => {
        if (document.body.contains(fireworks)) document.body.removeChild(fireworks);
      }, 2000);
    }

    function getSchoolFullName(schoolCode) {
      if (schoolCode === 'Jose Wilson') return 'EEEFM Prof José Wilson Pereira Leite';
      else if (schoolCode === 'CEAM') return 'CEAM - Colégio Estadual de Ensino Médio Integral Archangelia Milhomem';
      return schoolCode;
    }

    function resetQuiz() {
      currentQuestion = 0;
      studentAnswers = [];
      document.getElementById('resultsContainer').classList.add('hidden');
      document.getElementById('studentForm').classList.remove('hidden');
    }

    // Funções do professor
    function loginTeacher() {
      const password = document.getElementById('teacherPassword').value;
      if (password === TEACHER_PASSWORD) {
        document.getElementById('teacherLogin').classList.add('hidden');
        document.getElementById('teacherPanel').classList.remove('hidden');
        loadQuestionsList();
        loadResults(); // Carrega resultados ao entrar
      } else {
        alert('Senha incorreta! Tente novamente.');
      }
    }

    function showTeacherSubtab(subtab) {
      document.getElementById('subtabQuestions').classList.remove('active');
      document.getElementById('subtabResults').classList.remove('active');
      document.getElementById('teacherQuestions').classList.add('hidden');
      document.getElementById('teacherResults').classList.add('hidden');

      if (subtab === 'questions') {
        document.getElementById('subtabQuestions').classList.add('active');
        document.getElementById('teacherQuestions').classList.remove('hidden');
        loadQuestionsList();
      } else {
        document.getElementById('subtabResults').classList.add('active');
        document.getElementById('teacherResults').classList.remove('hidden');
        loadResults();
      }
    }

    async function loadQuestionsList() {
      const questionsList = document.getElementById('questionsList');
      questionsList.innerHTML = '<h4>Questões Cadastradas:</h4>';
      questions.forEach((question, index) => {
        const subjectName = question.subject === 'math' ? 'Matemática' : 'Física';
        const hasImage = question.imageUrl ? '🖼️ ' : '';
        const questionItem = document.createElement('div');
        questionItem.className = 'question-item';
        questionItem.innerHTML = `
          <strong>${hasImage}Q${index + 1} (${subjectName})</strong> ${question.question.substring(0, 80)}... <br>
          <small>Resposta: ${String.fromCharCode(65 + question.correct)}</small>
          <button class="btn btn-danger" onclick="deleteQuestion(${index})" style="float: right; padding: 5px 10px; font-size: 12px;">🗑️ Excluir</button>
        `;
        questionsList.appendChild(questionItem);
      });
      await processMathJax(questionsList);
    }

    async function addQuestion() {
      const newQuestion = document.getElementById('newQuestion').value.trim();
      const optionA = document.getElementById('optionA').value.trim();
      const optionB = document.getElementById('optionB').value.trim();
      const optionC = document.getElementById('optionC').value.trim();
      const optionD = document.getElementById('optionD').value.trim();
      const correctAnswer = parseInt(document.getElementById('correctAnswer').value);
      const subject = document.getElementById('questionSubject').value;
      const imageUrl = document.getElementById('questionImage').value.trim() || ''; // Novo campo

      if (!newQuestion || !optionA || !optionB || !optionC || !optionD) {
        alert('Por favor, preencha todos os campos!');
        return;
      }

      questions.push({
        question: newQuestion,
        options: [optionA, optionB, optionC, optionD],
        correct: correctAnswer,
        subject: subject,
        imageUrl: imageUrl // salva a URL da imagem
      });

      localStorage.setItem('quizQuestions', JSON.stringify(questions));

      // Limpar campos
      document.getElementById('newQuestion').value = '';
      document.getElementById('optionA').value = '';
      document.getElementById('optionB').value = '';
      document.getElementById('optionC').value = '';
      document.getElementById('optionD').value = '';
      document.getElementById('questionImage').value = '';

      await loadQuestionsList();
      alert('Questão adicionada com sucesso!');
    }

    async function deleteQuestion(index) {
      if (confirm('Tem certeza que deseja excluir esta questão?')) {
        questions.splice(index, 1);
        localStorage.setItem('quizQuestions', JSON.stringify(questions));
        await loadQuestionsList();
        alert('Questão excluída!');
      }
    }

    // Funções para resultados
    function loadResults() {
      const resultsList = document.getElementById('resultsList');
      const statsDiv = document.getElementById('resultsStats');
      
      if (results.length === 0) {
        resultsList.innerHTML = '<p>Nenhum resultado registrado ainda.</p>';
        statsDiv.innerHTML = '';
        return;
      }

      // Estatísticas gerais
      const totalAlunos = results.length;
      const mediaGeral = (results.reduce((acc, r) => acc + (r.score / r.total * 100), 0) / totalAlunos).toFixed(1);
      const totalQuestoesRespondidas = results.reduce((acc, r) => acc + r.total, 0);
      const totalAcertos = results.reduce((acc, r) => acc + r.score, 0);
      const percentualAcertoGeral = ((totalAcertos / totalQuestoesRespondidas) * 100).toFixed(1);

      statsDiv.innerHTML = `
        <div class="stats">
          <div class="stat-card">
            <h4>Total de Avaliações</h4>
            <div class="number">${totalAlunos}</div>
          </div>
          <div class="stat-card">
            <h4>Média de Aproveitamento</h4>
            <div class="number">${mediaGeral}%</div>
          </div>
          <div class="stat-card">
            <h4>Acertos Totais</h4>
            <div class="number">${totalAcertos}/${totalQuestoesRespondidas}</div>
            <div>(${percentualAcertoGeral}%)</div>
          </div>
        </div>
      `;

      // Lista de resultados
      let html = '<h4>Registros:</h4>';
      results.forEach((res, idx) => {
        html += `
          <div class="result-item" onclick="toggleResultDetail(${idx})">
            <strong>${res.studentName}</strong> - ${res.subject} - ${res.score}/${res.total} (${res.percentage}%)<br>
            <small>${new Date(res.date).toLocaleString('pt-BR')} - ${res.educationLevel} - ${res.studentClass}</small>
          </div>
          <div id="result-detail-${idx}" class="result-detail hidden">
            <button class="btn btn-danger" onclick="deleteResult(${idx})" style="float:right;">Excluir</button>
            <h4>Detalhes das Questões</h4>
            ${res.questions.map((q, qIdx) => `
              <div class="result-question ${q.isCorrect ? 'correct' : 'incorrect'}">
                <strong>Questão ${qIdx+1}</strong> ${q.isCorrect ? '✅' : '❌'}<br>
                <small>${q.question.substring(0, 100)}...</small><br>
                <small>Resposta do aluno: ${String.fromCharCode(65 + q.studentAnswer)}</small><br>
                <small>Resposta correta: ${String.fromCharCode(65 + q.correct)}</small>
              </div>
            `).join('')}
          </div>
        `;
      });
      resultsList.innerHTML = html;
    }

    function toggleResultDetail(index) {
      const detail = document.getElementById(`result-detail-${index}`);
      if (detail) detail.classList.toggle('hidden');
    }

    function deleteResult(index) {
      if (confirm('Excluir este resultado?')) {
        results.splice(index, 1);
        localStorage.setItem('quizResults', JSON.stringify(results));
        loadResults();
      }
    }

    function clearAllResults() {
      if (confirm('Tem certeza que deseja limpar TODOS os resultados?')) {
        results = [];
        localStorage.setItem('quizResults', JSON.stringify(results));
        loadResults();
      }
    }

    // Inicialização: aguarda MathJax e depois processa a aba inicial
    (async function init() {
      if (window.MathJax) {
        try {
          await MathJax.startup.promise;
          window.mathJaxReady = true;
          console.log('MathJax inicializado com sucesso');
          const studentTab = document.getElementById('studentTab');
          if (studentTab && !studentTab.classList.contains('hidden')) {
            await processMathJax(studentTab);
          }
        } catch (error) {
          console.error('Erro ao inicializar MathJax:', error);
        }
      }
    })();

    document.addEventListener('DOMContentLoaded', function() {
      console.log('Sistema de Avaliação carregado!');
    });
  </script>
